web-port: 10551
web-dir: ../www

log-dir: ./logs
log-rotation-period: 86400 # every 24h

database-dir: ./dbs

start-time-training: "2026-03-02 03:13:46" # start time (will be automaticly added after first run - you can remove this and run again)
end-time-training: "2028-03-09 03:13:46" # end time (will be automaticly added after first run - you can remove this and run again)

flag-lifetime-in-min: 10 # you can change flag time live (in minutes)

checker-type: local-script
checker-workdir: ./checker
checker-target-host: localhost
checker-script-path: ./example_checker.py
checker-script-wait-in-sec: 5 # max time for running script
checker-script-time-sleep-between-run-in-sec: 15 # like a round for service